<!DOCTYPE html>

<html>

  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="css/rps_final.css">
  </head>

  <body>
    <p class="title">Rock Paper Scissors</p>

    <button class="move-button" onclick="
      playGame('rock');
    ">
    <img src="img/rock-emoji.png" class="move-icon">
    </button>

    <button class="move-button" onclick="
      playGame('paper');
    ">
    <img src="img/paper-emoji.png" class="move-icon">
    </button>

    <button class="move-button" onclick="
      playGame('scissors');
    ">
    <img src="img/scissors-emoji.png" class="move-icon">
    </button>

    <p class="js-result result"></p>
    <p class="js-moves moves"></p>
    <p class="js-score score"></p>

    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScoreElement();
    " class="reset-score-button">Reset Score</button>

    <script src="js/rps_final.js"></script>
  </body>

</html>

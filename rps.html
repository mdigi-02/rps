<!DOCTYPE html>

<html>

  <head>
    <title>Rock Paper Scissors (Advanced)</title>
    <link rel="stylesheet" href="css/rps.css">
  </head>

  <body>
    <p class="title">Rock Paper Scissors</p>

    <button class="move-button js-rock-button">
    <img src="img/rock-emoji.png" class="move-icon">
    </button>

    <button class="move-button js-paper-button">
    <img src="img/paper-emoji.png" class="move-icon">
    </button>

    <button class="move-button js-scissors-button">
    <img src="img/scissors-emoji.png" class="move-icon">
    </button>

    <p class="js-result result"></p>
    <p class="js-moves moves"></p>
    <p class="js-score score"></p>

    <button class="reset-score-button js-reset-score-button">Reset Score</button>

    <button class="auto-play-button js-auto-play-button">Auto Play</button>

    <p class="help-header">Shortcuts</p>

    <ul class="help-text">
        <li>Press <b>r</b> to play Rock.</li>
        <li>Press <b>p</b> to play Paper.</li>
        <li>Press <b>s</b> to play Scissors.</li>
        <li>Press <b>a</b> for Auto Play.</li>
        <li>Press <b>Backspace</b> to reset score.</li>
    </ul>

    <script src="js/rps.js"></script>
  </body>

</html>
